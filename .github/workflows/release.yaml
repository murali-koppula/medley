
name: Publish Production Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go Runtime
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Compile Cross-Platform Production Binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o medley .
          tar -czf medley-linux-amd64.tar.gz medley
          rm medley

          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o medley .
          tar -czf medley-darwin-arm64.tar.gz medley
          rm medley

          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o medley.exe .
          zip medley-windows-amd64.zip medley.exe
          rm medley.exe

          sha256sum medley-*.tar.gz medley-*.zip > checksums.txt

      - name: Generate Automated GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            medley-linux-amd64.tar.gz
            medley-darwin-arm64.tar.gz
            medley-windows-amd64.zip
            checksums.txt

